<footer
    class="fixed bottom-0 left-0 z-999
    w-screen h-24
    bg-black/30 backdrop-blur-2xl
    border-t border-white/10
    flex items-center justify-center px-3 select-none">

    <div
        class="absolute inset-0 bg-linear-to-r
        from-green-500/10 via-emerald-400/5 to-green-500/10">
    </div>

    <div class="relative z-20 flex items-center gap-3 w-full max-w-xl justify-between">

        <button type="button"
            [ngClass]="{
                'bg-green-900/80 scale-95 ring-2 ring-green-300/30':
                footerLink() === 'net'
            }"
            class="group relative overflow-hidden
            flex items-center justify-center gap-3
            w-1/2 h-16
            rounded-3xl
            bg-linear-to-br from-green-500 to-emerald-700
            shadow-2xl shadow-green-900/50
            border border-white/10
            transition-all duration-300
            active:scale-95 hover:scale-[1.03] cursor-pointer"
            (click)="openNet()">

            <div
                class="absolute inset-0 opacity-0 group-hover:opacity-100
                transition-all duration-500
                bg-linear-to-r from-transparent via-white/20 to-transparent
                -translate-x-full group-hover:translate-x-full">
            </div>

            <svg xmlns="http://www.w3.org/2000/svg"
                width="28" height="28"
                viewBox="0 0 512 512"
                class="text-white drop-shadow-lg relative z-10">

                <path fill="currentColor"
                    d="M378 324a69.78 69.78 0 0 0-48.83 19.91L202 272.41a69.7 69.7 0 0 0 0-32.82l127.13-71.5A69.76 69.76 0 1 0 308.87 129l-130.13 73.2a70 70 0 1 0 0 107.56L308.87 383A70 70 0 1 0 378 324"/>
            </svg>

            <span class="text-white font-bold text-base sm:text-lg relative z-10">
                Redes
            </span>
        </button>

        <button type="button"
            [ngClass]="{
                'bg-green-900/80 scale-95 ring-2 ring-green-300/30':
                footerLink() === 'phones'
            }"
            class="group relative overflow-hidden
            flex items-center justify-center gap-3
            w-1/2 h-16
            rounded-3xl
            bg-linear-to-br from-green-500 to-emerald-700
            shadow-2xl shadow-green-900/50
            border border-white/10
            transition-all duration-300
            active:scale-95 hover:scale-[1.03] cursor-pointer"
            (click)="openContact()">

            <div
                class="absolute inset-0 opacity-0 group-hover:opacity-100
                transition-all duration-500
                bg-linear-to-r from-transparent via-white/20 to-transparent
                -translate-x-full group-hover:translate-x-full ease-in-out">
            </div>

            <svg xmlns="http://www.w3.org/2000/svg"
                width="28" height="28"
                viewBox="0 0 512 512"
                class="text-white drop-shadow-lg relative z-10">

                <path fill="currentColor"
                    d="M256 256a112 112 0 1 0-112-112a112 112 0 0 0 112 112m0 32c-69.42 0-208 42.88-208 128v64h416v-64c0-85.12-138.58-128-208-128"/>
            </svg>

            <span class="text-white font-bold text-base sm:text-lg relative z-10">
                Contacto
            </span>
        </button>

    </div>
</footer>

<div
    [ngClass]="{
        'opacity-100 -translate-x-68': footerLink() === 'phones',
        'opacity-0 translate-x-10 pointer-events-none': footerLink() !== 'phones'
    }"

    class="fixed bottom-28 -right-65 z-50
    transition-all duration-400 ease-in-out
    select-none will-change-transform">

    <div
        [ngClass]="{
            'animate-none': footerLink() !== 'phones'
        }"

        class="bg-black/30 backdrop-blur-2xl
        border border-white/10
        shadow-2xl shadow-black/40
        rounded-4xl p-3 w-64">

        <button type="button"
            class="flex mb-2 items-center justify-center gap-1
            bg-linear-to-r from-green-500 to-emerald-700
            p-3 w-full text-white font-bold text-lg
            rounded-2xl h-14
            shadow-xl shadow-green-900/40
            transition-all duration-300
            hover:scale-[1.03] active:scale-95"
            (click)="contactWithCelular1()">

            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16"><path fill="currentColor" d="M7 12a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1zM5.75 1A1.75 1.75 0 0 0 4 2.75v10.5c0 .966.784 1.75 1.75 1.75h4.5A1.75 1.75 0 0 0 12 13.25V2.75A1.75 1.75 0 0 0 10.25 1zM5 2.75A.75.75 0 0 1 5.75 2h4.5a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.5a.75.75 0 0 1-.75-.75z"/></svg>

            Celular 1
        </button>

        <button type="button"
            class="flex mb-2 items-center justify-center gap-1
            bg-linear-to-r from-green-500 to-emerald-700
            p-3 w-full text-white font-bold text-lg
            rounded-2xl h-14
            shadow-xl shadow-green-900/40
            transition-all duration-300
            hover:scale-[1.03] active:scale-95"
            (click)="contactWithCelular2()">

            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16"><path fill="currentColor" d="M7 12a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1zM5.75 1A1.75 1.75 0 0 0 4 2.75v10.5c0 .966.784 1.75 1.75 1.75h4.5A1.75 1.75 0 0 0 12 13.25V2.75A1.75 1.75 0 0 0 10.25 1zM5 2.75A.75.75 0 0 1 5.75 2h4.5a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.5a.75.75 0 0 1-.75-.75z"/></svg>

            Celular 2
        </button>

        <button type="button"
            class="flex items-center justify-center gap-3
            bg-linear-to-r from-green-500 to-emerald-700
            p-3 w-full text-white font-bold text-lg
            rounded-2xl h-14
            shadow-xl shadow-green-900/40
            transition-all duration-300
            hover:scale-[1.03] active:scale-95"
            (click)="contactWithTelephone()">

            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 20 20"><path fill="currentColor" d="M17.256 12.253c-.096-.667-.611-1.187-1.274-1.342c-2.577-.604-3.223-2.088-3.332-3.734C12.193 7.092 11.38 7 10 7s-2.193.092-2.65.177c-.109 1.646-.755 3.13-3.332 3.734c-.663.156-1.178.675-1.274 1.342l-.497 3.442C2.072 16.907 2.962 18 4.2 18h11.6c1.237 0 2.128-1.093 1.953-2.305zM10 15.492c-1.395 0-2.526-1.12-2.526-2.5s1.131-2.5 2.526-2.5s2.526 1.12 2.526 2.5s-1.132 2.5-2.526 2.5M19.95 6c-.024-1.5-3.842-3.999-9.95-4C3.891 2.001.073 4.5.05 6s.021 3.452 2.535 3.127c2.941-.381 2.76-1.408 2.76-2.876C5.345 5.227 7.737 4.98 10 4.98s4.654.247 4.655 1.271c0 1.468-.181 2.495 2.76 2.876C19.928 9.452 19.973 7.5 19.95 6"/></svg>

            Fijo
        </button>

    </div>
</div>

<div
    [ngClass]="{
        'opacity-100 translate-x-68': footerLink() === 'net',
        'opacity-0 -translate-x-10 pointer-events-none': footerLink() !== 'net'
    }"

    class="fixed bottom-28 -left-65 z-50
    transition-all duration-500 ease-in-out
    select-none will-change-transform">

    <div
        [ngClass]="{
            'animate-none': footerLink() !== 'net'
        }"

        class="bg-black/30 backdrop-blur-2xl
        border border-white/10
        shadow-2xl shadow-black/40
        rounded-4xl p-3 w-64">

        <!-- WHATSAPP 1 -->
        <button type="button" type="button"
            class="w-full mb-2 h-14 rounded-2xl
            bg-linear-to-r from-green-500 to-emerald-700
            text-white font-bold shadow-xl
            flex items-center justify-center gap-3
            hover:scale-[1.03] active:scale-95 transition-all"
            (click)="contactWithWhatsapp1()">

            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="9" cy="9" r="1"/><circle cx="15" cy="15" r="1"/><path d="M8 9a7 7 0 0 0 7 7m-9 5.2A11 11 0 1 0 2.8 18L2 22Z"/></g></svg>

            WhatsApp 1
        </button>

        <button type="button" type="button"
            class="w-full mb-2 h-14 rounded-2xl
            bg-linear-to-r from-green-500 to-emerald-700
            text-white font-bold shadow-xl
            flex items-center justify-center gap-3
            hover:scale-[1.03] active:scale-95 transition-all"
            (click)="contactWithWhatsapp2()">

            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="9" cy="9" r="1"/><circle cx="15" cy="15" r="1"/><path d="M8 9a7 7 0 0 0 7 7m-9 5.2A11 11 0 1 0 2.8 18L2 22Z"/></g></svg>
            WhatsApp 2
        </button>

        <button type="button" type="button"
            class="w-full h-14 rounded-2xl
            bg-linear-to-r from-green-500 to-emerald-700
            text-white font-bold shadow-xl
            flex items-center justify-center gap-3
            hover:scale-[1.03] active:scale-95 transition-all"
            (click)="contactWithFacebook()">

            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"><path fill="currentColor" d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95"/></svg>

            Facebook
        </button>

    </div>
</div>
